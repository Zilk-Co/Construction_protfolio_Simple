[build]
  command = "pnpm --filter @workspace/zmco-website... run build"
  publish = "artifacts/zmco-website/dist/public"

[[redirects]]
  from = "/api/*"
  to = "https://construction-portfolio-api-simple.onrender.com/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/uploads/*"
  to = "https://construction-portfolio-api-simple.onrender.com/uploads/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
